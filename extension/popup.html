<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiCheck Lens</title>
  <style>
    :root {
      /* Light mode colors */
      --bg-gradient-start: #667eea;
      --bg-gradient-end: #764ba2;
      --container-bg: #ffffff;
      --text-primary: #1a202c;
      --text-secondary: #6b7280;
      --text-tertiary: #374151;
      --border-color: #e5e7eb;
      --instruction-bg: #f3f4f6;
      --instruction-border: #667eea;
      --btn-secondary-bg: #ffffff;
      --btn-secondary-hover: #f3f4f6;
      --shadow-color: rgba(0, 0, 0, 0.05);
    }

    .dark {
      /* Dark mode colors */
      --bg-gradient-start: #4c51bf;
      --bg-gradient-end: #5a3d8a;
      --container-bg: #1f2937;
      --text-primary: #f9fafb;
      --text-secondary: #e5e7eb;
      --text-tertiary: #f3f4f6;
      --border-color: #374151;
      --instruction-bg: #374151;
      --instruction-border: #818cf8;
      --btn-secondary-bg: #374151;
      --btn-secondary-hover: #4b5563;
      --shadow-color: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      min-height: 200px;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 0;
      transition: background 0.3s ease;
    }
    
    .container {
      background: var(--container-bg);
      border-radius: 0;
      padding: 24px;
      transition: background-color 0.3s ease;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      padding-top: 12px;
    }

    .theme-toggle {
      background: var(--instruction-bg);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px var(--shadow-color);
      margin-top: 12px;
    }

    .theme-toggle:hover {
      background: var(--btn-secondary-hover);
      transform: scale(1.1);
      box-shadow: 0 4px 12px var(--shadow-color);
    }

    .theme-icon {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .theme-toggle:hover .theme-icon {
      transform: rotate(180deg);
    }

    .theme-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      transition: color 0.3s ease;
      white-space: nowrap;
    }

    .dark .theme-text {
      color: #f9fafb;
    }

    .dark .theme-toggle {
      border-color: #4b5563;
      background: #2d3748;
    }

    .dark .theme-toggle:hover {
      background: #3d4a5c;
    }
    
    .header-content {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      margin-top: 8px;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      margin-right: 12px;
    }
    
    .title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }
    
    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 8px 0 0 0;
      line-height: 1.4;
      transition: color 0.3s ease;
    }

    .dark .subtitle {
      color: #e5e7eb;
      font-weight: 500;
    }
    
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-color), transparent);
      margin: 20px 0;
      transition: background 0.3s ease;
    }
    
    .instruction {
      background: var(--instruction-bg);
      border-left: 3px solid var(--instruction-border);
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    
    .instruction-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 6px;
      transition: color 0.3s ease;
    }

    .dark .instruction-title {
      color: #f9fafb;
      font-weight: 700;
    }
    
    .instruction-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      transition: color 0.3s ease;
    }

    .dark .instruction-text {
      color: #e5e7eb;
    }
    
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
      text-decoration: none;
      color: white;
    }
    
    .btn:last-child {
      margin-bottom: 0;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: #667eea;
      border: 2px solid #667eea;
      box-shadow: 0 2px 8px var(--shadow-color);
      transition: all 0.2s ease;
    }
    
    .dark .btn-secondary {
      color: #a5b4fc;
      border-color: #818cf8;
      font-weight: 600;
    }

    .dark .btn-secondary span {
      color: #e0e7ff;
    }
    
    .btn-secondary:hover {
      background: var(--btn-secondary-hover);
      transform: translateY(-2px);
    }
    
    .icon {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <img src="images/logo_logicheck_extension.png" alt="LogiCheck Logo" class="logo">
        <h1 class="title">LogiCheck Lens</h1>
      </div>
      <p class="subtitle">AI-powered logical fallacy detection</p>
      
      <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">
        <svg class="theme-icon sun-icon" fill="currentColor" viewBox="0 0 20 20" style="display: none; color: #fbbf24;">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
        <span class="theme-text sun-text" style="display: none;">Switch to Light Mode</span>
        <svg class="theme-icon moon-icon" fill="currentColor" viewBox="0 0 20 20" style="display: block; color: #7c3aed;">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
        <span class="theme-text moon-text" style="display: block;">Switch to Dark Mode</span>
      </button>
    </div>

    <div class="divider"></div>

    <div class="instruction">
      <div class="instruction-title">💡 How to use:</div>
      <div class="instruction-text">
        1. Select any text on a webpage<br>
        2. Right-click → "Analyze with LogiCheck"<br>
        3. View analysis in sidebar
      </div>
    </div>

    <button id="analyzeSelected" class="btn btn-primary">
      <span class="icon">🔍</span>
      <span>Analyze Selected Text</span>
    </button>

    <button id="openSettings" class="btn btn-secondary">
      <span class="icon">⚙️</span>
      <span>Configure API Key</span>
    </button>

    <button id="openWebsite" class="btn btn-secondary">
      <span class="icon">🌐</span>
      <span>Visit LogiCheck Website</span>
    </button>
  </div>

  <!-- External script to avoid CSP issues -->
  <script src="popup.js"></script>
</body>
</html>
