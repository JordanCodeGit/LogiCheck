<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiCheck Lens</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      min-height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 0;
    }
    
    .container {
      background: white;
      border-radius: 0;
      padding: 24px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .header-content {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      margin-right: 12px;
    }
    
    .title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }
    
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin: 8px 0 0 0;
      line-height: 1.4;
    }
    
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
      margin: 20px 0;
    }
    
    .instruction {
      background: #f3f4f6;
      border-left: 3px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    
    .instruction-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    
    .instruction-text {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
    
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
      text-decoration: none;
      color: white;
    }
    
    .btn:last-child {
      margin-bottom: 0;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    
    .btn-secondary:hover {
      background: #f3f4f6;
      transform: translateY(-2px);
    }
    
    .icon {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <img src="images/logo_logicheck_extension.png" alt="LogiCheck Logo" class="logo">
        <h1 class="title">LogiCheck Lens</h1>
      </div>
      <p class="subtitle">AI-powered logical fallacy detection</p>
    </div>

    <div class="divider"></div>

    <div class="instruction">
      <div class="instruction-title">💡 How to use:</div>
      <div class="instruction-text">
        1. Select any text on a webpage<br>
        2. Right-click → "Analyze with LogiCheck"<br>
        3. View analysis in sidebar
      </div>
    </div>

    <button id="analyzeSelected" class="btn btn-primary">
      <span class="icon">🔍</span>
      <span>Analyze Selected Text</span>
    </button>

    <button id="openSettings" class="btn btn-secondary">
      <span class="icon">⚙️</span>
      <span>Configure API Key</span>
    </button>

    <button id="openWebsite" class="btn btn-secondary">
      <span class="icon">🌐</span>
      <span>Visit LogiCheck Website</span>
    </button>
  </div>

  <!-- External script to avoid CSP issues -->
  <script src="popup.js"></script>
</body>
</html>
